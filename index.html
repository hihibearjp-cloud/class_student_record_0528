        (function() {
            // 加入了 Pro++ 文字在左上角
            const svgSource = `
            <svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
                <rect width="512" height="512" rx="100" fill="#FFD700"/>
                <rect x="66" y="106" width="380" height="300" rx="24" fill="#5D4037"/>
                <rect x="86" y="126" width="340" height="260" rx="12" fill="#1B5E20"/>

            </svg>`;

            function generateAppleIcon() {
                const canvas = document.createElement('canvas');
                canvas.width = 192;
                canvas.height = 192;
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgSource)));
                img.onload = function() {
                    ctx.drawImage(img, 0, 0, 192, 192);
                    const pngData = canvas.toDataURL('image/png');
                    const iosLink = document.getElementById('ios-icon');
                    const favLink = document.getElementById('fav-icon');
                    if (iosLink) iosLink.href = pngData;
                    if (favLink) favLink.href = pngData;
                };
            }
            generateAppleIcon();
        })();
    </script>

        .loader {

            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #error-log { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); color: #D32F2F; padding: 20px; z-index: 10000; overflow: auto; font-family: monospace; font-size: 16px; white-space: pre-wrap; }

        #print-area { display: block; width: 100%; }
        
        @media print {
            body, html { background: white !important; margin: 0; padding: 0; overflow: visible !important; height: auto !important; }
            .no-print { display: none !important; }
            
            /* 強制 iOS Safari 列印背景與邊框顏色 */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            
            @page { size: B4 portrait; margin: 5mm; }
            .print-page { page-break-after: always; height: 340mm; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); gap: 6mm; padding: 5mm; box-sizing: border-box; }
            .print-card { border: 2px solid #5D4037; border-radius: 8px; padding: 12px; position: relative; overflow: hidden; display: flex; flex-direction: column; box-sizing: border-box; background-color: #fff; }
            
            /* 預留空間給底部的簽名欄，防止文字重疊 */
            .print-content { font-size: 11pt; line-height: 1.35; flex-grow: 1; white-space: pre-wrap; margin-bottom: 75px; color: black; }
            .print-card:has(.content-overflow) .print-content { font-size: 10pt; line-height: 1.25; }
            
            .signature-box { position: absolute; bottom: 8px; right: 12px; left: 12px; font-size: 12pt; font-weight: bold; text-align: right; padding-top: 10px; background: white; z-index: 10; }
            .scissors-line { border-top: 2px dashed #999; margin: 8px 0; position: relative; }
            .scissors-icon { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: white; padding: 0 10px; font-size: 14pt; color: #666; }
        }

                  reader.onload = (e) => {
                      try {
                          const data = new Uint8Array(e.target.result);
                          const workbook = XLSX.read(data, {type: 'array'});
                          const firstSheetName = workbook.SheetNames[0];
                          const worksheet = workbook.Sheets[firstSheetName];
                          const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                          
                          let names = [];
                          jsonData.forEach(row => {
                              if(row[0] && typeof row[0] === 'string') names.push(row[0]);
                          });
                          
                          if(names.length > 0) {

                              setIsProcessing(false);
                          });
                  };
                  reader.readAsArrayBuffer(file);
              }
              else if (file.type.startsWith('image/')) {
                  Tesseract.recognize(
                      file,
                      'chi_tra',
                      { logger: m => console.log(m) }
                  ).then(({ data: { text } }) => {
                      const cleanText = text.split(/\s+/).filter(s => s.length >= 2).join('\n');
                      setBulkNamesInput(cleanText);
                      showAlert('圖片辨識完成！OCR 可能有錯字，請務必檢查。');

                setStudents(names.map((name, index) => ({ id: index + 1, name: name })));
                setBulkNamesInput('');
                showAlert('匯入成功！');
            });
          };
          
          const handleAddSubject = () => { 
              if (newSubjectName.trim()) { 
                  const newId = `sub_${Date.now()}`; 
                  setSubjects([...subjects, { id: newId, label: newSubjectName.trim() }]); 
                  setNewSubjectName(''); 
                  setIsAddingSubject(false); 
                  setCurrentSubjectId(newId); 
              } else {
                  showAlert("請輸入科目名稱");
              }
          };

              e.stopPropagation(); 
              showConfirm('確定刪除此科目？', () => {
                  setSubjects(subjects.filter(s => s.id !== id));
              });
          };
          
          const handleAddBehavior = () => { 
              if (newBehaviorName.trim()) {

                  setNewBehaviorName(''); 
              } else {
                  showAlert("請輸入違規項目名稱");
              }
          };
          const handleDeleteBehavior = (id, e) => { 
              e.stopPropagation(); 
              showConfirm('確定刪除此項目？', () => {
                setBehaviors(behaviors.filter(b => b.id !== id));
              });
          };

          const handleAddContactBook = () => {
              if (newContactBookName.trim()) {
                  const colors = ['bg-pink', 'bg-yellow', 'bg-mint', 'bg-blue-soft', 'bg-purple-soft', 'bg-orange-soft'];
                  const randomColor = colors[Math.floor(Math.random() * colors.length)];
                  setContactBookTypes([...contactBookTypes, { id: `cb_${Date.now()}`, label: newContactBookName.trim(), icon: 'FileWarning', color: randomColor }]);
                  setNewContactBookName('');
              } else {
                  showAlert("請輸入聯絡簿項目名稱");
              }
          };
          
          const handleDeleteContactBook = (id, e) => {
              e.stopPropagation();
              showConfirm('確定刪除此項目？', () => {
                  setContactBookTypes(contactBookTypes.filter(c => c.id !== id));
              });
          };
          
          const handleAttendanceClick = (typeId) => {
              if (typeId === 'other_leave') {
                  const currentNote = attendanceNotes['other_leave'] || "";
                  showPrompt("請輸入「其他」缺席的原因 (例如：事假、喪假)：", currentNote, (note) => {
                      if (note) {
                          setAttendanceNotes(prev => ({ ...prev, 'other_leave': note }));
                          openSelector('attendance', typeId);
                      }
                  });
              } else {
                  openSelector('attendance', typeId);
              }
          };
          
          const handleBehaviorClick = (behaviorId) => {
            if (isEditingBehaviors) {
                const b = behaviors.find(x => x.id === behaviorId);
                if (b) {
                    showPrompt(`重新命名「${b.label}」：`, b.label, (newName) => {
                        if (newName && newName.trim()) {
                            setBehaviors(prev => prev.map(item => item.id === behaviorId ? { ...item, label: newName.trim() } : item));
                        }
                    });
                }
                return;
            }
            if (behaviorId === 'other') {
              const currentNote = periodNotes[currentLogPeriod] || '';
              showPrompt(`請輸入 ${PERIODS.find(p=>p.id===currentLogPeriod)?.label} 的其他說明：`, currentNote, (note) => {
                  updatePeriodNote(note || '');
                  openSelector('log', behaviorId, currentLogPeriod);
              });
            } else {
              openSelector('log', behaviorId, currentLogPeriod);
            }
          };

          const openSelector = (type, category, period = null) => { setSelectorConfig({ type, category, period }); setIsSelectorOpen(true); };
          
          const toggleStudent = useCallback((studentId) => {
            const { type, category, period } = selectorConfig;
            if (type === 'attendance') setAttendanceData(prev => { const list = prev[category] || []; return { ...prev, [category]: list.includes(studentId) ? list.filter(id => id !== studentId) : [...list, studentId] }; });
            else if (type === 'missing') setMissingData(prev => { const list = prev[category] || []; return { ...prev, [category]: list.includes(studentId) ? list.filter(id => id !== studentId) : [...list, studentId] }; });
            else if (type === 'log') setClassLogData(prev => { const out = prev[period] || {}; const list = out[category] || []; return { ...prev, [period]: { ...out, [category]: list.includes(studentId) ? list.filter(id => id !== studentId) : [...list, studentId] } }; });
            else if (type === 'incident') setIncidentStudents(prev => prev.includes(studentId) ? prev.filter(id => id !== studentId) : [...prev, studentId]);
          }, [selectorConfig]);

          const getSelectedStudents = () => {
            const { type, category, period } = selectorConfig;
            if (type === 'attendance') return attendanceData[category] || [];
            if (type === 'missing') return missingData[category] || [];
            if (type === 'log') return classLogData[period]?.[category] || [];
            if (type === 'incident') return incidentStudents;
            return [];
          };

          const updatePeriodNote = (val) => setPeriodNotes(prev => ({ ...prev, [currentLogPeriod]: val }));
          const downloadCSV = (content, filename) => {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob(['\uFEFF' + content], { type: 'text/csv;charset=utf-8;' }));
            link.download = filename;
            link.click();
          };

          // 支援日期區間的統計函數
          const getWeeklyStats = (studentId, customStart = null, customEnd = null) => {
            let dates = [];
            if (customStart && customEnd) {
                // 自訂區間：由新到舊
                const s = new Date(customStart);
                const e = new Date(customEnd);
                for (let d = new Date(e); d >= s; d.setDate(d.getDate() - 1)) {
                      dates.push(d.toISOString().split('T')[0]);
                }
            } else {
                // 預設5天
                const today = new Date(currentDate); 
                for (let i = 0; i < 5; i++) { 
                    const d = new Date(today); 
                    d.setDate(today.getDate() - i); 
                    dates.push(d.toISOString().split('T')[0]); 
                }
            }
            
            let stats = { attendance: {}, missing: {}, behavior: {}, contactBook: {}, homework: {} }; 
            let detailedBehaviors = [];
            let detailedAttendance = []; 
            let detailedMissing = [];
            let detailedContactBook = [];
            let detailedHomework = [];     

            dates.forEach(date => {
              const data = allData[date]; if (!data) return;
              const dateStr = date.slice(5).replace('-','/'); // 10/25

              if (data.attendanceData) Object.keys(data.attendanceData).forEach(k => { 
                  if (data.attendanceData[k]?.includes(studentId)) { 
                      stats.attendance[k] = (stats.attendance[k] || 0) + 1; 
                      const typeName = ATTENDANCE_TYPES.find(t=>t.id===k)?.label || k;
                      detailedAttendance.push(`${dateStr} ${typeName}`);
                  } 
              });

              if (data.missingData) Object.keys(data.missingData).forEach(k => { 
                  if (data.missingData[k]?.includes(studentId)) { 
                      const isContactBook = contactBookTypes.some(c => c.id === k);
                      const sub = subjects.find(s => s.id === k);
                      let label = k;
                      if (sub) label = sub.label + '作業缺交';
                      if (isContactBook) label = contactBookTypes.find(c => c.id === k)?.label || k;
                      stats.missing[label] = (stats.missing[label] || 0) + 1;
                      detailedMissing.push(`${dateStr} ${label}`);
                      if (isContactBook) {
                          stats.contactBook[label] = (stats.contactBook[label] || 0) + 1;
                          detailedContactBook.push(`${dateStr} ${label}`);
                      } else {
                          stats.homework[label] = (stats.homework[label] || 0) + 1;
                          detailedHomework.push(`${dateStr} ${label}`);
                      }
                  } 
              });

              if (data.classLogData) Object.keys(data.classLogData).forEach(periodId => { 
                  const pLog = data.classLogData[periodId]; 
                  if (pLog) { 
                      Object.keys(pLog).forEach(bId => { 
                          if (pLog[bId]?.includes(studentId)) { 
                              const b = behaviors.find(be => be.id === bId); 
                              const label = b ? b.label : '其他'; 
                              const periodLabel = PERIODS.find(p => p.id === periodId)?.label || periodId; 
                              
                              let displayLabel = label;
                              if (bId === 'other' && data.periodNotes && data.periodNotes[periodId]) {
                                  displayLabel = `${label}(${data.periodNotes[periodId]})`;
                              }
                              
                              stats.behavior[displayLabel] = (stats.behavior[displayLabel] || 0) + 1; 
                              detailedBehaviors.push(`${dateStr} ${periodLabel}：${displayLabel}`); 
                          } 
                      }); 
                  } 
              });

              if (data.incidentIncludeInReport && data.incidentStudents && data.incidentStudents.includes(studentId)) {
                  stats.behavior['偶發事件'] = (stats.behavior['偶發事件'] || 0) + 1;
                  const shortLog = data.incidentLog ? (data.incidentLog.length > 15 ? data.incidentLog.substring(0, 15) + '...' : data.incidentLog.replace(/\n/g, ' ')) : '無文字說明';
                  detailedBehaviors.push(`${dateStr} 偶發：${shortLog}`);
              }
            });

            return { 
                dates, 
                stats, 
                detailedBehaviors: detailedBehaviors.reverse(),
                detailedAttendance: detailedAttendance.reverse(),
                detailedMissing: detailedMissing.reverse(),
                detailedContactBook: detailedContactBook.reverse(),
                detailedHomework: detailedHomework.reverse()
            };
          };
          
          // --- 這是新的矩陣式匯出功能 ---
          const handleExportIntervalStats = () => {
             if (!statsStartDate || !statsEndDate) { showAlert("請選擇開始與結束日期！"); return; }
             
             const start = new Date(statsStartDate);
             const end = new Date(statsEndDate);
             const dateRangeText = `${statsStartDate}_${statsEndDate}`;
             
             // 1. 準備表頭 (Headers)
             let csvHeader = ["座號", "姓名"];
             // 加入缺勤類別標題
             ATTENDANCE_TYPES.forEach(t => csvHeader.push(t.label));
             // 加入聯絡簿標題
             contactBookTypes.forEach(t => csvHeader.push(t.label));
             // 加入科目作業標題
             subjects.forEach(s => csvHeader.push(s.label + "缺交"));
             // 加入違規行為標題
             behaviors.forEach(b => csvHeader.push(b.label));
             csvHeader.push("偶發事件");
             
             let csv = csvHeader.join(",") + "\n"; // 換行

             // 2. 統計每個學生的數據
             students.forEach(s => {
                 // 初始化計數器 (每個項目都先歸零)
                 let counts = {};
                 
                 // 遍歷日期區間
                 for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                     const dateKey = d.toISOString().split('T')[0];
                     const dayData = allData[dateKey];
                     
                     if (dayData) {
                         // 統計缺勤
                         if (dayData.attendanceData) {
                             Object.entries(dayData.attendanceData).forEach(([key, list]) => {
                                 if (list && list.includes(s.id)) counts[key] = (counts[key] || 0) + 1;
                             });
                         }
                         // 統計缺交 (作業 & 聯絡簿)
                         if (dayData.missingData) {
                             Object.entries(dayData.missingData).forEach(([key, list]) => {
                                 if (list && list.includes(s.id)) counts[key] = (counts[key] || 0) + 1;
                             });
                         }
                         // 統計違規 (課堂紀錄)
                         if (dayData.classLogData) {
                             Object.values(dayData.classLogData).forEach(periodLogs => {
                                 if (periodLogs) {
                                     Object.entries(periodLogs).forEach(([key, list]) => {
                                         if (list && list.includes(s.id)) counts[key] = (counts[key] || 0) + 1;
                                     });
                                 }
                             });
                         }
                         // 統計偶發事件
                         if (dayData.incidentIncludeInReport && dayData.incidentStudents && dayData.incidentStudents.includes(s.id)) {
                             counts['偶發事件'] = (counts['偶發事件'] || 0) + 1;
                         }
                     }
                 }

                 // 3. 組合該學生的 CSV 行 (Row)
                 let row = [s.id, s.name];
                 
                 // 依序填入數字，如果沒有就是 0
                 ATTENDANCE_TYPES.forEach(t => row.push(counts[t.id] || 0));
                 contactBookTypes.forEach(t => row.push(counts[t.id] || 0));
                 subjects.forEach(sub => row.push(counts[sub.id] || 0));
                 behaviors.forEach(b => row.push(counts[b.id] || 0));
                 row.push(counts['偶發事件'] || 0);
                 
                 csv += row.join(",") + "\n";
             });
             
             downloadCSV(csv, `詳細統計矩陣_${dateRangeText}.csv`);
          };

          // --- 這是新的匯出區間偶發事件 (Word) 功能 ---
          const handleExportIncidentsWord = () => {
             if (!incidentStartDate || !incidentEndDate) { 
                 showAlert("請選擇開始與結束日期！"); 
                 return; 
             }
             const start = new Date(incidentStartDate);
             const end = new Date(incidentEndDate);
             if (start > end) { 
                 showAlert("開始日期不能晚於結束日期！"); 
                 return; 
             }

             let htmlContent = `<h1 style="text-align: center; font-family: 'Microsoft JhengHei', sans-serif; color: #5D4037;">班級偶發事件紀錄</h1>`;
             htmlContent += `<p style="text-align: center; font-family: 'Microsoft JhengHei', sans-serif; color: #666; font-size: 14pt;">區間：${incidentStartDate} ~ ${incidentEndDate}</p><hr style="border: 1px solid #ccc; margin-bottom: 20px;" />`;
             
             let hasData = false;

             // 遍歷日期區間
             for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                 const dateKey = d.toISOString().split('T')[0];
                 const dayData = allData[dateKey];
                 
                 // 確認該日期有資料且 incidentLog 不為空 或是 有涉事學生
                 if (dayData && ((dayData.incidentLog && dayData.incidentLog.trim() !== '') || (dayData.incidentStudents && dayData.incidentStudents.length > 0))) {
                     hasData = true;
                     const formattedLog = (dayData.incidentLog || '').replace(/\n/g, '<br/>'); // 處理換行
                     
                     htmlContent += `<div style="font-family: 'Microsoft JhengHei', sans-serif; margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background-color: #f9f9f9;">`;
                     htmlContent += `<h3 style="color: #1976D2; margin-top: 0; border-bottom: 2px dashed #1976D2; padding-bottom: 8px;">📅 日期：${dateKey}</h3>`;
                     
                     if (dayData.incidentStudents && dayData.incidentStudents.length > 0) {
                         const studentStr = dayData.incidentStudents.map(id=>students.find(s=>s.id===id)?.name || id).join('、');
                         htmlContent += `<p style="color: #D32F2F; font-weight: bold; margin-bottom: 8px;">涉事學生：${studentStr}</p>`;
                     }
                     if (formattedLog) {
                         htmlContent += `<p style="line-height: 1.6; font-size: 14pt; color: #333;">${formattedLog}</p>`;
                     }
                     htmlContent += `</div>`;
                 }
             }

             if (!hasData) {
                 showAlert("所選區間內沒有偶發事件的紀錄喔！");
                 return;
             }

             // 包裝成 Word 可讀的 HTML 格式
             const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>偶發事件紀錄</title></head><body>";
             const footer = "</body></html>";
             const sourceHTML = header + htmlContent + footer;
             
             // 建立 Blob 並下載為 .doc 檔案
             const blob = new Blob(['\ufeff', sourceHTML], { type: 'application/msword' });
             const url = URL.createObjectURL(blob);
             const link = document.createElement('a');
             link.href = url;
             link.download = `偶發事件紀錄_${incidentStartDate}_${incidentEndDate}.doc`;
             document.body.appendChild(link);
             link.click();
             document.body.removeChild(link);
             URL.revokeObjectURL(url);
          };

          const getDailyStudentViolations = () => {
            const studentViolations = {};
            PERIODS.forEach(p => {
              const logs = classLogData[p.id]; if (!logs) return;
              behaviors.forEach(b => {
                const list = logs[b.id]; if (list && list.length > 0) list.forEach(studentId => { if (!studentViolations[studentId]) studentViolations[studentId] = []; studentViolations[studentId].push(`${p.label}: ${b.label}`); });
              });
            });
            return studentViolations;
          };

          const exportDailyLog = () => {
            let csv = `班級日誌,日期：${currentDate},週次：${week},值日生：${dutyStudent}\n\n【到校】\n類別,學生\n`;
            ATTENDANCE_TYPES.forEach(t => { const list = attendanceData[t.id]?.map(id => { const s = students.find(stud => stud.id === id); return s ? `${id}(${s.name})` : id; }).join('、') || ''; if(list) csv += `${t.label},"${list}"\n`; });
            csv += `\n【作業】\n項目,缺交\n`;
            const getMissingNames = (list) => list?.map(id => { const s = students.find(stud => stud.id === id); return s ? `${id}(${s.name})` : id; }).join('、') || '';
            contactBookTypes.forEach(t => { const str = getMissingNames(missingData[t.id]); if(str) csv += `${t.label},"${str}"\n`; });
            subjects.forEach(s => { const str = getMissingNames(missingData[s.id]); if(str) csv += `${s.label}缺交,"${str}"\n`; });
            csv += `\n【課堂】\n時段,行為,學生,備註\n`;
            PERIODS.forEach(p => {
              const logs = classLogData[p.id]; const note = periodNotes[p.id] || '';
              if (logs) behaviors.forEach(b => { const rawList = logs[b.id]; if (rawList && rawList.length > 0) { const names = rawList.map(id => { const s = students.find(stud => stud.id === id); return s ? `${id}(${s.name})` : id; }).join('、'); csv += `${p.label},${b.label},"${names}","${note}"\n`; } });
              if ((!logs || Object.keys(logs).every(k => logs[k].length === 0)) && note) csv += `${p.label},備註,,"${note}"\n`;
            });
            
            let incidentStudsStr = '';
            if (incidentStudents && incidentStudents.length > 0) {
                incidentStudsStr = '涉事學生: ' + incidentStudents.map(id=>students.find(s=>s.id===id)?.name || id).join('、') + '\n';
            }
            csv += `\n【偶發】\n"${incidentStudsStr}${incidentLog.replace(/"/g, '""')}"\n`;
            downloadCSV(csv, `班級日誌_${currentDate}.csv`);
          };

          const exportWholeClassWeekly = () => { 
             const dates = []; const today = new Date(currentDate); for (let i = 0; i < 5; i++) { const d = new Date(today); d.setDate(today.getDate() - i); dates.push(d.toISOString().split('T')[0]); } 
             let csv = `全班週報表\n統計範圍,${dates[dates.length-1]} ~ ${dates[0]}\n\n座號,姓名,缺勤總數,缺交總數,違規總數,缺勤明細,缺交明細,違規明細\n`; 
             students.forEach(student => { const { stats } = getWeeklyStats(student.id); const totalAtt = Object.values(stats.attendance).reduce((a,b) => a+b, 0); const totalMiss = Object.values(stats.missing).reduce((a,b) => a+b, 0); const totalBeh = Object.values(stats.behavior).reduce((a,b) => a+b, 0); const strAtt = Object.entries(stats.attendance).map(([k,v]) => { const t = ATTENDANCE_TYPES.find(x => x.id === k); return `${t?.label || k}(${v})`; }).join('、'); const strMiss = Object.entries(stats.missing).map(([k,v]) => `${k}(${v})`).join('、'); const strBeh = Object.entries(stats.behavior).map(([k,v]) => `${k}(${v})`).join('、'); csv += `${student.id},${student.name},${totalAtt},${totalMiss},${totalBeh},"${strAtt}","${strMiss}","${strBeh}"\n`; }); 
             downloadCSV(csv, `全班週報表_${currentDate}.csv`); 
          };
          
          const handleResetData = () => {
              showConfirm("⚠️ 警告：這將會刪除所有歷史資料！\n此動作無法復原。\n\n確定要重置嗎？", () => {
                  localStorage.removeItem('classLogDB_Line');
                  localStorage.removeItem('classLogTeacherNote');
                  showAlert("資料已重置！");
                  setTimeout(() => window.location.reload(), 1500);
              });
          };

          const handleBackupData = () => {
              const data = {
                  version: "2.0",
                  timestamp: new Date().toISOString(),
                  classLogDB: JSON.parse(localStorage.getItem('classLogDB_Line') || '{}'),
                  subjects: JSON.parse(localStorage.getItem('classLogSubjects') || '[]'),
                  behaviors: JSON.parse(localStorage.getItem('classLogBehaviors') || '[]'),
                  students: JSON.parse(localStorage.getItem('classLogStudents') || '[]'),
                  contactBookTypes: JSON.parse(localStorage.getItem('classLogContactBook') || '[]'),
                  teacherNote: localStorage.getItem('classLogTeacherNote') || ''
              };
              const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `班級小管家備份_${new Date().toISOString().slice(0,10)}.json`;
              a.click();
          };

          const handleRestoreData = (event) => {
              const file = event.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = (e) => {
                  try {
                      const data = JSON.parse(e.target.result);
                      if (data.classLogDB) localStorage.setItem('classLogDB_Line', JSON.stringify(data.classLogDB));
                      if (data.subjects) localStorage.setItem('classLogSubjects', JSON.stringify(data.subjects));
                      if (data.behaviors) localStorage.setItem('classLogBehaviors', JSON.stringify(data.behaviors));
                      if (data.students) localStorage.setItem('classLogStudents', JSON.stringify(data.students));
                      if (data.contactBookTypes && data.contactBookTypes.length > 0) localStorage.setItem('classLogContactBook', JSON.stringify(data.contactBookTypes));
                      if (data.teacherNote) localStorage.setItem('classLogTeacherNote', data.teacherNote);
                      showAlert("資料還原成功！網頁即將重新整理。");
                      setTimeout(() => window.location.reload(), 1500);
                  } catch (err) {
                      showAlert("還原失敗：檔案格式錯誤");
                  }
              };
              reader.readAsText(file);
          };

          const handleUnlock = () => {
              if (pinInput === appPin) {
                  setIsLocked(false);
              } else {
                  showAlert("密碼錯誤，請重試！");
                  setPinInput('');
              }
          };

          const handleSavePin = () => {
              showConfirm(newPinInput ? "確定要啟用/更新密碼嗎？\n請務必牢記，忘記密碼需清除瀏覽器資料(會遺失未備份資料)！" : "確定要停用密碼鎖嗎？", () => {
                  setAppPin(newPinInput);
                  localStorage.setItem('classLogAppPin', newPinInput);
                  showAlert(newPinInput ? "密碼已更新並啟用！" : "密碼鎖已停用！");

                                   className="input-hand w-full h-80 p-4 text-lg leading-relaxed shadow-inner resize-none" 
                                   value={finalReportText} 
                                   onChange={(e) => setFinalReportText(e.target.value)}
                               />
                           </div>

                           <div className="flex flex-col gap-2">
                             <div className="grid grid-cols-4 gap-2">
                               <button onClick={() => copyToClipboard(finalReportText)} className="btn-3d bg-yellow py-3 flex flex-col items-center justify-center gap-1 shadow-sm">
                                 <Icon name="ClipboardCopy" className="w-6 h-6 text-coffee" /> <span className="text-coffee font-bold text-xs tracking-wide">純複製</span>
                               </button>
                               <button onClick={() => handleLineShare(finalReportText)} className="btn-3d bg-mint py-3 flex flex-col items-center justify-center gap-1 shadow-sm">
                                 <Icon name="Send" className="w-6 h-6 text-coffee" /> <span className="text-coffee font-bold text-xs tracking-wide">LINE</span>
                               </button>
                               <button onClick={() => { copyToClipboard(finalReportText); window.open('https://manager.line.biz/', '_blank'); }} className="btn-3d bg-purple-soft py-3 flex flex-col items-center justify-center gap-1 shadow-sm">
                                 <Icon name="MessageCircle" className="w-6 h-6 text-coffee" /> <span className="text-coffee font-bold text-xs tracking-wide">LINE @</span>
                               </button>
                               <button onClick={() => window.open(`sms:?body=${encodeURIComponent(finalReportText)}`, '_self')} className="btn-3d bg-orange-soft py-3 flex flex-col items-center justify-center gap-1 shadow-sm">
                                 <Icon name="Smartphone" className="w-6 h-6 text-coffee" /> <span className="text-coffee font-bold text-xs tracking-wide">發簡訊</span>
                               </button>
                             </div>
                           </div>
                         </div>
                     </>
                 ) : (
                     <div className="p-8 text-center text-gray-500 font-bold text-xl mt-10">請先從上方選單選擇一位學生</div>
                 )}
                 
                 {/* 批次報表列印區塊 (新增日期區間選擇) */}
                 <div className="doodle-card p-5 bg-white mt-6">
                    <h3 className="text-2xl font-bold mb-4 flex items-center gap-2 border-b-2 border-coffee pb-2 text-coffee">
                        <Icon name="Printer" className="w-8 h-8"/> 批次列印 / 匯出報表
                    </h3>
                    
                    <div className="flex gap-4 mb-4">
                        <label className="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="printMode" checked={printMode === 'default'} onChange={() => setPrintMode('default')} className="w-5 h-5 accent-coffee" />
                            <span className="font-bold text-lg">預設 (過去5天)</span>
                        </label>
                        <label className="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="printMode" checked={printMode === 'custom'} onChange={() => setPrintMode('custom')} className="w-5 h-5 accent-coffee" />
                            <span className="font-bold text-lg">自訂區間</span>
                        </label>
                    </div>

                    {printMode === 'custom' && (
                        <div className="grid grid-cols-2 gap-4 mb-4 bg-orange-50 p-3 rounded-xl border border-coffee">
                            <div>
                                <label className="font-bold opacity-70 block">開始日期</label>
                                <input type="date" value={printCustomStart} onChange={e => setPrintCustomStart(e.target.value)} className="input-hand text-lg w-full" />
                            </div>
                            <div>
                                <label className="font-bold opacity-70 block">結束日期</label>
                                <input type="date" value={printCustomEnd} onChange={e => setPrintCustomEnd(e.target.value)} className="input-hand text-lg w-full" />
                            </div>
                        </div>
                    )}

                    <div className="space-y-3">
                        <button onClick={handlePrintAllStudents} className="w-full py-3 text-coffee bg-white border-2 border-coffee rounded-xl flex items-center justify-center gap-2 font-bold hover:bg-gray-50 transition shadow-sm">
                            <Icon name="Printer" className="w-5 h-5"/> 列印全班週報 ({printMode === 'default' ? '預設' : '自訂'})
                        </button>
                        <button onClick={exportWholeClassWeekly} className="w-full py-3 text-coffee flex items-center justify-center gap-2 font-bold hover:bg-orange-100 rounded-xl transition">
                            <Icon name="FileSpreadsheet" className="w-5 h-5"/> 下載全班週報表 Excel
                        </button>
                        <button onClick={exportStudentWeekly} className="w-full py-2 text-coffee bg-white border-2 border-coffee rounded-xl flex items-center justify-center gap-2 text-sm font-bold hover:bg-blue-50 transition shadow-sm opacity-80">
                            <Icon name="Download" className="w-4 h-4"/> 下載個別報表 Excel (目前選擇學生)
                        </button>
                    </div>
                 </div>

                 {/* 學期/區間統計功能區塊 */}
                 <div className="doodle-card p-5 bg-purple-soft mt-6">
                    <h3 className="text-2xl font-bold mb-4 flex items-center gap-2 border-b-2 border-coffee pb-2 text-coffee">
                        <Icon name="FileSpreadsheet" className="w-8 h-8"/> 學期/區間統計 (僅 Excel)
                    </h3>
                    <div className="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label className="font-bold opacity-70 block">開始日期</label>
                            <input type="date" value={statsStartDate} onChange={e => setStatsStartDate(e.target.value)} className="input-hand text-lg w-full" />
                        </div>
                        <div>
                            <label className="font-bold opacity-70 block">結束日期</label>
                            <input type="date" value={statsEndDate} onChange={e => setStatsEndDate(e.target.value)} className="input-hand text-lg w-full" />
                        </div>
                    </div>
                    <button onClick={handleExportIntervalStats} className="btn-3d w-full bg-coffee text-white py-3 text-xl flex items-center justify-center gap-2">
                        <Icon name="Download" className="w-6 h-6"/> 匯出矩陣統計報表 (詳細數字)
                    </button>
                 </div>
              </div>
            );
          };

          return (
            <div className={`min-h-screen w-full max-w-4xl mx-auto relative flex flex-col ${printHtml ? '' : 'overflow-hidden'}`}>
              <style>{customStyles}</style>
              <Modal config={modalConfig} onClose={() => setModalConfig(prev => ({...prev, show: false}))} />
              
              <header className="no-print pt-8 pb-3 px-6 flex justify-between items-center"><h1 className="text-4xl font-bold text-coffee tracking-wider transform -rotate-1 flex items-center gap-3"><Icon name="BookOpen" className="w-10 h-10" /> Pro ++班級助理</h1><div className="flex gap-2"><button onClick={() => setActiveTab('manual')} className="bg-white p-2 rounded-full border-2 border-coffee shadow-sm active:scale-95 transition" title="使用說明書"><Icon name="HelpCircle" className="w-7 h-7 text-coffee"/></button><div className="bg-white p-2 rounded-full border-2 border-coffee shadow-sm flex items-center justify-center" title={saveStatus === 'saved' ? '已儲存' : '儲存中...'}>{saveStatus === 'saved' ? <Icon name="Check" className="w-7 h-7" /> : <Icon name="Loader" className="w-7 h-7" />}</div></div></header>
              
              <main className="no-print px-5 h-full pt-4 flex flex-col">
                  {/* 主要內容區塊 */}
                  <div className="flex-grow">
                    {activeTab === 'basic' && renderBasicInfo()}
                    {activeTab === 'log' && renderLog()}
                    {activeTab === 'review' && renderReview()}
                    {activeTab === 'report' && renderReports()}
                    {activeTab === 'settings' && renderSettings()}
                    {activeTab === 'manual' && renderManual()}
                  </div>

                  {/* 全域底部 Footer (計數器 + 簽名檔) - 在所有頁面都會顯示在最下方 */}
                  <div className="w-full flex justify-between items-end pb-32 pt-8">
                      {/* Counter Box */}
                      <div className="bg-[#FFF8E1] border-2 border-[#D7CCC8] rounded-xl px-3 py-2 flex flex-col items-center justify-center shadow-sm">
                          <div className="text-[10px] font-bold text-[#8D6E63] mb-1">累積使用人次</div>
                          <div className="flex gap-[1px]">
                              {displayCount.map((num, i) => (
                                  <div key={i} className="bg-gradient-to-b from-[#1976D2] to-[#0D47A1] text-white font-mono text-xs px-1 rounded-[2px] shadow-inner border border-[#000000] font-bold">
                                      {num}
                                  </div>
                              ))}
                          </div>
                      </div>

                      {/* Signature */}
                      <div className="text-right text-coffee pointer-events-none select-none">
                          <div className="text-xs font-bold tracking-wider mb-0.5 opacity-60">Designed by</div>
                          <div className="text-base italic flex items-center justify-end gap-1 font-sans" style={{ fontWeight: 600 }}>
                             Fun Croissant <span className="not-italic text-lg">🎡</span> 04/2026
                          </div>
                      </div>
                  </div>
              </main>

              { !printHtml && <StudentSelector 
                  isOpen={isSelectorOpen} 
                  onClose={() => setIsSelectorOpen(false)} 
                  title={(() => {
                      const { type, category, period } = selectorConfig;
                      if (type === 'attendance') return ATTENDANCE_TYPES.find(t => t.id === category)?.label || '點名';
                      if (type === 'missing') {
                          const cbItem = contactBookTypes.find(t => t.id === category);
                          const subjectItem = subjects.find(s => s.id === category);
                          return cbItem ? cbItem.label : (subjectItem ? `${subjectItem.label}缺交` : '項目');
                      }
                      if (type === 'log') {
                          const pName = PERIODS.find(p => p.id === period)?.label || period;
                          const bName = behaviors.find(b => b.id === category)?.label || '紀錄';
                          return `${pName} - ${bName}`;
                      }
                      if (type === 'incident') return '偶發事件涉事學生';
                      return '';
                  })()}
                  students={students} 
                  selected={getSelectedStudents()} 
                  onToggle={toggleStudent} 
              /> }
              
              { !printHtml && <nav className="fixed bottom-6 left-1/2 transform -translate-x-1/2 w-[98%] max-w-xl bg-[#FFF] border-3 border-coffee rounded-2xl shadow-[4px_4px_0px_#5D4037] flex justify-between px-3 py-3 z-40">
                {[{ id: 'basic', icon: 'User', label: '點名', color: 'bg-mint' }, { id: 'log', icon: 'Edit3', label: '紀錄', color: 'bg-yellow' }, { id: 'review', icon: 'List', label: '日誌', color: 'bg-pink' }, { id: 'report', icon: 'FileSpreadsheet', label: '報表', color: 'bg-blue-soft' }, { id: 'settings', icon: 'Settings', label: '設定', color: 'bg-red-alert' }].map(tab => ( <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 flex flex-col items-center p-2 rounded-xl transition-all duration-300 ${tab.id === 'settings' ? 'nav-btn-settings ' + (activeTab === 'settings' ? 'active' : '') : (activeTab === tab.id ? `${tab.color} -translate-y-4 border-2 border-coffee shadow-sm` : 'opacity-60')}`}><div className={tab.id === 'settings' ? 'text-white' : 'text-coffee'}><Icon name={tab.icon} className="w-8 h-8"/></div><span className={`text-sm font-black mt-1 ${tab.id === 'settings' ? 'text-white' : 'text-coffee'}`}>{tab.label}</span></button> ))}
              </nav> }
            </div>
          );
        }

        try {
            const container = document.getElementById('root');
            if(container) {
                const root = ReactDOM.createRoot(container);
                root.render(<ClassManagerLine />);
            } else {
                throw new Error("Root element not found");
            }
        } catch (err) {
            console.error(err);
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('error-log').style.display = 'block';
            document.getElementById('error-log').innerText = "啟動失敗: " + err.message;
        }
    </script>
</body>
</html>
